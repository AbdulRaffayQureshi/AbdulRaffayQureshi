name: Generate Snake Animation

on:
  schedule:
    # Runs automatically every 12 hours
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # Upgraded to the modern checkout version
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Generates the snake eating the grid squares
      - name: Generate GitHub Contributions Snake Animations
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%232E9EF7&color_dots=%23161b22,%230e4429,%23006d32,%2326a641,%2339d353
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Replaced crazy-max with GitHub's native, Node 24-compliant deployment engine
      - name: Deploy animations to output branch
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Push github-contribution-grid-snake.svg to the output branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: output
